<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./style/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="mb-3 card shadow p-5" style="width: 400px">
      <h1 class="mb-3">Login</h1>
      <input class="form-control mb-3" type="text" placeholder="Username" />
      <input class="form-control mb-3" type="password" placeholder="Password" />
      <div class="form-check mb-3">
        <input
          class="form-check-input"
          type="checkbox"
          value=""
          id="flexCheckDefault"
        />
        <label class="form-check-label" for="flexCheckDefault">
          Save login
        </label>
      </div>
      <button class="btn btn-danger mb-3">Login</button>
      <div class="mb-3">
          <a href="./login.html" class="text-danger fw-bolder text-decoration-none d-flex justify-content-center"
            >Already have an account?</a
          >
        </div>
    </div>
    </div>
  </body>
  <script src="./script/register.js"></script>
</html>
