<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="./style/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");
    </style>
    <style>
      body {
        @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap");
        font-family: "Montserrat", sans-serif;
        font-optical-sizing: auto;
        font-weight: 30;
        font-style: normal;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    style="
      background-image: url(./assets/Gemini_Generated_Image_vc2ovnvc2ovnvc2o.png);
    "
  >
    <div
      class="container vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="mb-3 card shadow p-5" style="width: 400px">
        <h1 class="mb-3 fw-bold">Login</h1>
        <input class="form-control mb-3" type="text" placeholder="Username" id="username" />
        <input
          class="form-control mb-3"
          type="password"
          placeholder="Password"
          id="password"
        />
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            value=""
            id="flexCheckDefault"
          />
          <label class="form-check-label fw-normal" for="flexCheckDefault">
            Save login
          </label>
        </div>
        <button id="btn-login" class="btn btn-danger mb-3 fw-bold">Login</button>
        <div class="mb-3">
          <a
            href="./register.html"
            class="text-danger fw-bold text-decoration-none d-flex justify-content-center fw-bold"
            >Create a new account</a
          >
        </div>
      </div>
    </div>
  </body>
  <script src="./script/login.js"></script>
</html>
