<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="./style/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div
      class="container vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="mb-3 card shadow p-5" style="width: 400px">
        <h1 class="mb-3">Register</h1>
        <input class="form-control mb-3" type="text" placeholder="Username" />
        <input class="form-control mb-3" type="email" placeholder="Email" />
        <input
          class="form-control mb-3"
          type="password"
          placeholder="Password"
        />
        <div class="mb-3">
          <a href="./login.html" class="text-danger fw-bolder text-decoration-none mb-3"
            >Already have an account?</a
          >
        </div>
        <button class="btn btn-danger fw-bolder">Create a new account</button>
      </div>
    </div>
  </body>
  <script src="./script/register.js"></script>
</html>
